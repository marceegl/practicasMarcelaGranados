<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro iphone</title>
</head>
<body>
    <h1>Registro para ganar un iphone 14 Pro Max</h1>
<form>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre">

    <label for="clave">Contraseña:</label>
    <input type="password" id="Clave" name="clave"><br>

    <p>¿Vive en San Salvador?</p>

    <input type="radio" id="si" name="residencia">
    <label for="si">Si</label>

    <input type="radio" id="no" name="residencia">
    <label for="no">No</label> <br> <br>

    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad"><br>

    <label for="correo">Correo electronico </label>
    <input type="email" id="correo" name="correo"><br>

    <input type="submit" value="Registrarse">
    <input type="reset" value="Borrar">

</form>
</body>
</html>
